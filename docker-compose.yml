# SE-QPT Docker Compose - Production
# Optimized for 2GB DigitalOcean Droplet

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: seqpt-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seqpt_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SeQpt_2025}
      POSTGRES_DB: ${POSTGRES_DB:-seqpt_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seqpt_admin} -d ${POSTGRES_DB:-seqpt_database}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Flask Backend
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: seqpt-backend
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-seqpt_admin}:${POSTGRES_PASSWORD:-SeQpt_2025}@db:5432/${POSTGRES_DB:-seqpt_database}
      - FLASK_ENV=${FLASK_ENV:-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 512M

  # Vue.js Frontend
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: seqpt-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  postgres_data:

networks:
  default:
    name: seqpt-network
